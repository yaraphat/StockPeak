version: "3.9"

services:
  # Next.js web app
  app:
    build:
      context: ./app
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: ${DATABASE_URL}
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET}
      NEXTAUTH_URL: ${NEXTAUTH_URL}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  # Notification engine (APScheduler long-running process)
  notifier:
    build:
      context: .
      dockerfile: scripts/Dockerfile.notifier
    environment:
      DATABASE_URL: ${DATABASE_URL}
      CLAUDE_API_KEY: ${CLAUDE_API_KEY}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
      TELEGRAM_CHANNEL_ID: ${TELEGRAM_CHANNEL_ID:-}
      OWNER_TELEGRAM_ID: ${OWNER_TELEGRAM_ID:-}
      RESEND_API_KEY: ${RESEND_API_KEY:-}
      BROKER_REPORT_PATH: /tmp/stockpeak-broker-report.json
      TZ: Asia/Dhaka
    volumes:
      # Share broker report between pipeline runs and notifier
      - broker_reports:/tmp
      - notifier_logs:/var/log/stockpeak
    restart: always
    healthcheck:
      test: ["CMD", "pgrep", "-f", "notification_engine.py"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 30s
    depends_on:
      - app

volumes:
  broker_reports:
  notifier_logs:
